<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zape Mídia — Bio Link</title>
  <meta name="description" content="Todos os links da Zape Mídia em um só lugar: site, WhatsApp e TikTok." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FF6A00;
      --orange-dark: #E05A00;
      --orange-light: #FF8C38;
      --black: #0A0A0A;
      --black-3: #1A1A1A;
      --white: #FFFFFF;
      --white-60: rgba(255,255,255,0.6);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      padding: 48px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* decorative dot grids */
    .dots {
      position: absolute;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      opacity: 0.6;
    }
    .dots span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--orange);
    }
    .dots.top-left { top: 32px; left: 24px; }
    .dots.bottom-right { bottom: 32px; right: 24px; }

    /* decorative curved lines */
    .curve {
      position: absolute;
      border: 1.5px solid rgba(255,106,0,0.5);
      pointer-events: none;
    }
    .curve.top-right {
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      border-color: transparent rgba(255,106,0,0.5) transparent transparent;
    }
    .curve.bottom-left {
      bottom: -60px; left: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      border-color: transparent transparent transparent rgba(255,106,0,0.5);
    }

    .logo-wrap {
      margin-top: 48px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(255,106,0,0.25) 0%, rgba(255,106,0,0.05) 60%, transparent 75%);
      border: 2px solid var(--orange);
      box-shadow: 0 0 60px rgba(255,106,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      width: 60%;
      height: 60%;
      object-fit: contain;
    }

    .divider {
      width: 100%;
      max-width: 360px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      margin: 36px 0 28px;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      background: rgba(255,106,0,0.05);
      border: 1.5px solid rgba(255,106,0,0.5);
      border-radius: 16px;
      padding: 18px 22px;
      text-decoration: none;
      color: var(--white);
      font-size: 1.15rem;
      font-weight: 700;
      transition: background .2s, transform .15s, box-shadow .2s;
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      background: rgba(255,106,0,0.14);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,106,0,0.3);
    }

    .link-icon {
      width: 46px; height: 46px;
      min-width: 46px;
      border-radius: 50%;
      border: 1.5px solid var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--orange);
    }

    .link-label { flex: 1; }

    .link-arrow {
      color: var(--orange);
      display: flex;
      transition: transform .2s;
    }

    .link-btn:hover .link-arrow { transform: translateX(4px); }

    .bolt-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 360px;
      margin: 40px 0 24px;
    }

    .bolt-divider .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,106,0,0.6));
    }
    .bolt-divider .line.right { background: linear-gradient(90deg, rgba(255,106,0,0.6), transparent); }
    .bolt-divider svg { color: var(--orange); }

    .tagline {
      text-align: center;
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--white);
      max-width: 340px;
    }

    .tagline .highlight { color: var(--orange); }

    .socials {
      display: flex;
      gap: 18px;
      margin-top: 36px;
    }

    .social-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--orange);
      text-decoration: none;
      transition: background .2s, transform .15s;
    }

    .social-icon:hover {
      background: rgba(255,106,0,0.15);
      transform: translateY(-2px);
    }

    footer {
      margin-top: auto;
      padding-top: 36px;
      font-size: .75rem;
      color: var(--white-60);
      text-align: center;
    }

    footer a { color: var(--orange-light); text-decoration: none; }
  </style>
</head>
